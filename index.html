<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <title>H5P MobileReader</title>
    <style>
      * { box-sizing: border-box; margin: 0; padding: 0; }
      body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f5f5; color: #333; }
      .app-shell { display: flex; flex-direction: column; height: 100vh; }
      .app-header { background: #1976d2; color: white; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }
      .app-header h1 { font-size: 1.2rem; font-weight: 600; }
      .app-nav { display: flex; gap: 8px; }
      .nav-btn { background: rgba(255,255,255,0.2); border: none; color: white; padding: 6px 12px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
      .nav-btn.active, .nav-btn:hover { background: rgba(255,255,255,0.35); }
      .main-content { flex: 1; overflow-y: auto; padding: 16px; }
      .library-toolbar { margin-bottom: 16px; }
      .library-list { display: flex; flex-direction: column; gap: 12px; }
      .library-card { background: white; border-radius: 8px; padding: 16px; box-shadow: 0 1px 4px rgba(0,0,0,0.1); display: flex; justify-content: space-between; align-items: flex-start; }
      .library-card.status-broken { border-left: 4px solid #ff9800; }
      .library-card.status-ok { border-left: 4px solid #4caf50; }
      .card-title { font-size: 1rem; font-weight: 600; margin-bottom: 4px; }
      .card-type { font-size: 0.8rem; color: #666; margin-bottom: 4px; }
      .card-author, .card-date { font-size: 0.8rem; color: #888; }
      .card-warning { font-size: 0.75rem; color: #ff9800; margin-top: 4px; }
      .card-actions { display: flex; flex-direction: column; gap: 8px; min-width: 80px; }
      .progress-bar { height: 4px; background: #eee; border-radius: 2px; margin-top: 8px; overflow: hidden; }
      .progress-fill { height: 100%; background: #1976d2; border-radius: 2px; }
      .btn-primary { background: #1976d2; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
      .btn-secondary { background: #eee; color: #333; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
      .btn-danger { background: #f44336; color: white; border: none; padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 0.9rem; }
      .btn-disabled { background: #ccc; color: #666; border: none; padding: 8px 16px; border-radius: 4px; font-size: 0.9rem; }
      .empty-state { text-align: center; padding: 40px; color: #888; }
      .import-status { padding: 12px; border-radius: 4px; margin-bottom: 12px; background: #e3f2fd; color: #1565c0; }
      .import-status.error { background: #ffebee; color: #c62828; }
      .import-status.success { background: #e8f5e9; color: #2e7d32; }
      .reader-view { display: flex; flex-direction: column; height: calc(100vh - 100px); }
      .reader-toolbar { display: flex; align-items: center; gap: 12px; margin-bottom: 12px; }
      .reader-title { flex: 1; font-weight: 600; font-size: 1rem; }
      .h5p-container { flex: 1; border: 1px solid #ddd; border-radius: 4px; overflow: hidden; background: white; }
      .diagnostics-toolbar { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
      .log-entries { display: flex; flex-direction: column; gap: 8px; }
      .log-entry { background: white; padding: 12px; border-radius: 4px; border-left: 4px solid #ccc; font-size: 0.85rem; }
      .log-entry.log-error { border-left-color: #f44336; }
      .log-entry.log-warn { border-left-color: #ff9800; }
      .log-entry.log-info { border-left-color: #2196f3; }
      .log-time { color: #888; margin-right: 8px; }
      .log-level { font-weight: 600; margin-right: 8px; }
      .log-context { background: #f5f5f5; padding: 8px; border-radius: 4px; margin-top: 8px; overflow-x: auto; font-size: 0.8rem; }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
